<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pirs</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0f14;
    --panel: #121820;
    --border: #243041;
    --text: #e6edf3;
    --muted: #8b9bb0;
    --user: #3dd68c;
    --assistant: #e6edf3;
    --tool: #58a6ff;
    --err: #ff7b72;
    --accent: #38bdf8;
    --think: #6e7f93;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: radial-gradient(1200px 600px at 10% -10%, #132033 0%, var(--bg) 55%);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(18,24,32,0.9);
    backdrop-filter: blur(8px);
  }
  header .brand {
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  #bar {
    flex: 1;
    color: var(--muted);
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 24px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .msg {
    margin: 0 0 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .user { color: var(--user); border-color: #1f3d2e; background: #0f1c16; }
  .assistant { color: var(--assistant); border-color: var(--border); background: var(--panel); }
  .thinking { color: var(--think); font-style: italic; font-size: 12px; margin: -4px 0 8px; }
  .tool { color: var(--tool); font-size: 12px; }
  .tool-result { color: var(--muted); font-size: 12px; margin-left: 8px; }
  .error { color: var(--err); }
  .status { color: #d29922; font-size: 12px; }
  #inputrow {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font: inherit;
    outline: none;
  }
  #input:focus { border-color: var(--accent); }
  button {
    background: #1c2633;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 16px;
    cursor: pointer;
    font: inherit;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  #drop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.75);
    color: var(--accent);
    font-size: 20px;
    font-weight: 600;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #drop.show { display: flex; }
</style>
</head>
<body>
<header>
  <div class="brand">pirs</div>
  <div id="bar">connecting…</div>
</header>
<div id="log"></div>
<div id="inputrow">
  <input id="input" placeholder="Message pirs · Enter to send · while running, steers the agent" autofocus>
  <button id="send" type="button">Send</button>
  <button id="cancel" type="button">Cancel</button>
</div>
<div id="drop">Drop image to attach path note</div>
<script>
const log = document.getElementById('log');
const bar = document.getElementById('bar');
const input = document.getElementById('input');
const drop = document.getElementById('drop');
let current = null;

function line(cls, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

function refreshState() {
  fetch('/state', authInit).then(r => r.json()).then(s => {
    bar.textContent = `${s.model} · ${s.running ? 'running' : 'idle'} · in ${s.usage.input} (${s.usage.cacheRead} cache) out ${s.usage.output} · ${s.usage.calls} calls`;
  }).catch(() => { bar.textContent = 'disconnected'; });
}
setInterval(refreshState, 2000);

let TOKEN = "__PIRS_TOKEN__";
if (!TOKEN || TOKEN === "__PIRS_TOKEN__") {
  TOKEN = localStorage.getItem('pirs-token') || prompt('pirs auth token:') || '';
  localStorage.setItem('pirs-token', TOKEN);
}
const authInit = { headers: { Authorization: `Bearer ${TOKEN}` } };
const es = new EventSource(`/events?token=${encodeURIComponent(TOKEN)}`);
es.onopen = () => refreshState();
es.onerror = () => { bar.textContent = 'event stream error — reconnecting…'; };
es.onmessage = (e) => {
  const ev = JSON.parse(e.data);
  switch (ev.type) {
    case 'message_start':
      if (ev.role === 'assistant') current = null;
      break;
    case 'message_update': {
      if (!current) current = { text: line('assistant', ''), think: line('thinking', '') };
      current.text.textContent = ev.text || '';
      current.think.textContent = ev.thinking ? 'thinking: ' + ev.thinking : '';
      current.think.style.display = ev.thinking ? '' : 'none';
      log.scrollTop = log.scrollHeight;
      break;
    }
    case 'message_end':
      if (ev.role === 'user') line('user', '> ' + (ev.text || ''));
      current = null;
      refreshState();
      break;
    case 'tool_start':
      line('tool', '› ' + ev.name + ' ' + (ev.args.command || ev.args.path || ev.args.pattern || ev.args.task || ev.args.query || ''));
      break;
    case 'tool_end':
      line(ev.isError ? 'error' : 'tool-result', (ev.isError ? '✗ ' : '· ') + (ev.text || '').split('\n').slice(0, 4).join('\n'));
      break;
    case 'status': line('status', '[' + ev.text + ']'); break;
    case 'usage': refreshState(); break;
  }
};

function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  fetch('/prompt', {
    method: 'POST',
    headers: { ...authInit.headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
}
document.getElementById('send').onclick = send;
document.getElementById('cancel').onclick = () => fetch('/cancel', { method: 'POST', headers: authInit.headers });
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Drag-and-drop: note the path in the composer (server cannot read arbitrary client files).
window.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('show'); });
window.addEventListener('dragleave', () => drop.classList.remove('show'));
window.addEventListener('drop', (e) => {
  e.preventDefault();
  drop.classList.remove('show');
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!f) return;
  input.value = (input.value ? input.value + '\n' : '') +
    `[image dropped: ${f.name} — use /image on a path the server can read, or vision_describe]`;
  input.focus();
});
refreshState();
</script>
</body>
</html>
