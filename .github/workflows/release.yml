name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: install cross (linux cross only)
        if: matrix.cross
        run: cargo install cross --locked
      - name: build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --workspace --target ${{ matrix.target }}
      - name: package
        run: |
          mkdir bundle
          cp target/${{ matrix.target }}/release/pirs bundle/
          cp target/${{ matrix.target }}/release/pirs-orchestrator bundle/
          tar -czf pirs-${{ matrix.target }}.tar.gz -C bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: pirs-${{ matrix.target }}
          path: pirs-${{ matrix.target }}.tar.gz
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pirs-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: pirs-*.tar.gz
